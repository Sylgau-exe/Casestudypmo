<script>
// ═══ GLOBAL ERROR SAFETY NET ═══
(function(){
  var overlay=document.createElement('div');
  overlay.id='errorOverlay';
  overlay.style.cssText='display:none;position:fixed;inset:0;background:rgba(255,255,255,0.97);z-index:9999;align-items:center;justify-content:center;font-family:system-ui,sans-serif';
  overlay.innerHTML='<div style="text-align:center;max-width:480px;padding:40px"><div style="font-size:48px;margin-bottom:20px">⚠️</div><h2 id="errTitle" style="color:#1e293b;font-size:22px;margin-bottom:12px">Something went wrong</h2><p id="errDetail" style="color:#6b7280;font-size:15px;line-height:1.6;margin-bottom:24px">An unexpected error occurred. Please try again.</p><div style="display:flex;gap:12px;justify-content:center"><a href="/negotiate/dashboard" style="padding:10px 24px;background:#ED1B2F;color:#fff;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px">Back to scenarios</a><a href="/" style="padding:10px 24px;background:transparent;color:#6b7280;border:1px solid #334155;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px">Back to Hub</a></div></div>';
  document.body.appendChild(overlay);
  function showError(title,detail){
    document.getElementById('errTitle').textContent=title||'Something went wrong';
    document.getElementById('errDetail').textContent=detail||'An unexpected error occurred. Please try again.';
    overlay.style.display='flex';
  }
  window.__showError=showError;
  window.onerror=function(msg){showError('Page Error','Something went wrong during the negotiation: '+msg+'. Try reloading or go back to scenarios.');return true};
  window.onunhandledrejection=function(e){var msg=e.reason&&e.reason.message?e.reason.message:'Unknown error';showError('Connection Error','Could not connect to the server: '+msg+'. Check your internet and try again.')};
})();
</script>
<script>
const API='',token=localStorage.getItem('auth_token'),userName=localStorage.getItem('user_name')||'Negotiator';
const params=new URLSearchParams(window.location.search),scenarioId=params.get('scenario');
if(!token)window.location.href='/negotiate';
const lang=getLang();

let state={phase:'loading',session:null,scenario:null,briefing:null,messages:[],exchangeCount:0,maxExchanges:15,sending:false,status:'active',louisOpen:false,louisChat:[],louisSending:false,louisSpoken:{}};

// === Louis Voice (ElevenLabs TTS) ===
let louisVoiceMuted=localStorage.getItem('louis_muted')==='true';
let louisSpeaking=false;
let louisAudio=null;
let louisAudioCache={};
let louisAbort=null;
let louisGenId=0;

function cleanTextForSpeech(text){
  return text
    .replace(/[\u{1F600}-\u{1F6FF}\u{1F900}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}💡🎯🎩🎭📋🏁💬⏰⚠️🤝🚶🎓]/gu,'')
    .replace(/\*\*/g,'').replace(/\*/g,'').replace(/#/g,'').replace(/`/g,'')
    .replace(/\n+/g,'. ').replace(/\s+/g,' ').trim();
}

async function louisSpeak(text,autoPlay,btnId){
  if(autoPlay&&louisVoiceMuted)return;
  var clean=cleanTextForSpeech(text);
  if(!clean)return;
  // Stop everything — audio, browser TTS, and abort any in-flight fetch
  louisStop();

  var myId=++louisGenId;

  // Check cache first
  var cacheKey=clean.slice(0,100)+lang;
  if(louisAudioCache[cacheKey]){
    if(myId===louisGenId) playAudioBlob(louisAudioCache[cacheKey]);
    return;
  }

  louisSpeaking=true;
  updateSpeakButtons();

  // Show loading spinner on the button that triggered this
  if(btnId){
    var btn=document.getElementById(btnId);
    if(btn){btn.classList.add('loading');btn.innerHTML='<span class="listen-spinner"></span> '+(lang==='fr'?'Louis prépare...':'Louis is thinking...')}
  }

  try{
    louisAbort=new AbortController();
    var resp=await fetch(API+'/api/neg/game/tts',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify({text:clean,lang:lang}),
      signal:louisAbort.signal
    });
    if(myId!==louisGenId)return;
    if(!resp.ok) throw new Error('TTS failed');
    var blob=await resp.blob();
    if(myId!==louisGenId)return;
    louisAudioCache[cacheKey]=blob;
    playAudioBlob(blob);
  }catch(e){
    if(e.name==='AbortError')return;
    console.warn('ElevenLabs TTS failed, falling back to browser TTS:',e);
    if(myId!==louisGenId)return;
    louisSpeaking=false;
    updateSpeakButtons();
    resetListenButtons();
    browserTTSFallback(clean);
  }
}

function playAudioBlob(blob){
  // Stop any existing audio first
  if(louisAudio){louisAudio.pause();louisAudio=null}
  var url=URL.createObjectURL(blob);
  louisAudio=new Audio(url);
  louisAudio.volume=1.0;
  louisSpeaking=true;
  updateSpeakButtons();
  // Update any loading btn-listen to "Playing — Stop"
  document.querySelectorAll('.btn-listen.loading').forEach(function(btn){
    btn.classList.remove('loading');btn.classList.add('speaking');
    btn.innerHTML='<span class="speak-pulse"></span> '+(lang==='fr'?'▶ En cours... Cliquer pour arrêter':'▶ Playing... Click to stop');
  });
  louisAudio.onended=function(){louisSpeaking=false;updateSpeakButtons();resetListenButtons();URL.revokeObjectURL(url)};
  louisAudio.onerror=function(){louisSpeaking=false;updateSpeakButtons();resetListenButtons();URL.revokeObjectURL(url)};
  louisAudio.play().catch(function(e){
    console.warn('Audio play blocked:',e);
    louisSpeaking=false;updateSpeakButtons();resetListenButtons();
  });
}

function resetListenButtons(){
  document.querySelectorAll('.btn-listen').forEach(function(btn){
    btn.classList.remove('speaking','loading');
    btn.innerHTML='<span class="listen-icon">🔊</span> '+t('neg_listen_louis');
  });
}

function browserTTSFallback(text){
  if(!window.speechSynthesis)return;
  var u=new SpeechSynthesisUtterance(text);
  u.lang=lang==='fr'?'fr-CA':'en-US';u.rate=1.0;u.pitch=0.95;
  var voices=window.speechSynthesis.getVoices();
  var tl=lang==='fr'?'fr':'en';
  var v=voices.filter(function(x){return x.lang.startsWith(tl)});
  if(v.length)u.voice=v[0];
  louisSpeaking=true;updateSpeakButtons();
  u.onend=function(){louisSpeaking=false;updateSpeakButtons()};
  u.onerror=function(){louisSpeaking=false;updateSpeakButtons()};
  window.speechSynthesis.speak(u);
}

function louisStop(){
  // Abort any in-flight fetch
  if(louisAbort){try{louisAbort.abort()}catch(e){}louisAbort=null}
  // Stop audio player
  if(louisAudio){louisAudio.pause();louisAudio.currentTime=0;louisAudio=null}
  // Stop browser TTS
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  louisSpeaking=false;
  updateSpeakButtons();
  resetListenButtons();
}

function toggleLouisMute(){
  louisVoiceMuted=!louisVoiceMuted;
  localStorage.setItem('louis_muted',louisVoiceMuted);
  if(louisVoiceMuted)louisStop();
  // Update the toggle button directly — no full re-render
  var btn=document.querySelector('.louis-voice-toggle');
  if(btn){
    btn.classList.toggle('muted',louisVoiceMuted);
    btn.innerHTML=(louisVoiceMuted?'🔇 Voice OFF':'🔊 Voice ON');
  }
}

function speakOrStop(text){
  if(louisSpeaking){louisStop()}else{louisSpeak(text,false)}
}

function listenBriefing(){
  if(document.querySelector('.btn-listen.loading'))return; // already loading
  if(louisSpeaking){louisStop();return}
  louisSpeak(state.briefing.louis,false,'btn-listen-briefing');
}

function listenMsg(i){
  if(document.querySelector('.btn-listen.loading'))return; // already loading
  if(louisSpeaking){louisStop();return}
  louisSpeak(state.messages[i].content,false,'btn-listen-msg'+i);
}

function updateSpeakButtons(){
  document.querySelectorAll('.btn-speak').forEach(function(btn){
    btn.classList.toggle('speaking',louisSpeaking);
  });
}

async function api(path,opts={}){const r=await fetch(API+path,{...opts,headers:{'Content-Type':'application/json','Authorization':'Bearer '+token,...(opts.headers||{})},body:opts.body?JSON.stringify(opts.body):undefined});const d=await r.json();if(!r.ok){const err=new Error(d.error);err.data=d;throw err}return d}

async function init(){
  render();
  try{
    if(!scenarioId){window.location.href='/negotiate/dashboard';return}
    const d=await api('/api/neg/game/start',{method:'POST',body:{scenarioId,lang}});
    state.session={id:d.sessionId};state.scenario=d.scenario;state.briefing=d.briefing;state.maxExchanges=15;state.phase='briefing';render()
  }catch(err){
    if(err.message.includes('active session')){
      document.getElementById('app').innerHTML='<div class="loading-screen"><h2>'+t('neg_active_session')+'</h2><p style="color:#334155;font-size:17px;margin-bottom:20px">'+t('neg_active_msg')+'</p><div style="display:flex;gap:12px;justify-content:center"><button onclick="abandonAndRestart()" style="padding:12px 24px;background:var(--accent-gradient);color:#fff;font-weight:700;font-size:16px;border:none;border-radius:8px;cursor:pointer;font-family:var(--font-body)">'+t('neg_start_fresh')+'</button><a href="/negotiate/dashboard" style="padding:12px 24px;background:var(--bg-card);color:#334155;font-weight:600;font-size:16px;border:1px solid #e2e8f0;border-radius:8px;text-decoration:none;display:inline-block">'+t('neg_back_dashboard')+'</a></div></div>';
      return;
    }
    if(err.message.includes('LIMIT_REACHED')||err.message.includes('SCENARIO_LOCKED')){document.getElementById('app').innerHTML='<div class="loading-screen"><h2>Access Issue</h2><p style="color:#334155;font-size:17px">Please contact your instructor for assistance.</p><a href="/negotiate/dashboard" style="color:var(--accent-primary);font-size:16px">'+t('neg_back_dashboard')+'</a></div>';return}
    document.getElementById('app').innerHTML='<div class="loading-screen"><h2>Error</h2><p style="color:#334155;font-size:17px">'+err.message+'</p><a href="/negotiate/dashboard" style="color:var(--accent-primary);font-size:16px">'+t('neg_back_dashboard')+'</a></div>'
  }
}

async function abandonAndRestart(){
  document.getElementById('app').innerHTML='<div class="loading-screen"><div class="spinner"></div><h2>'+t('neg_starting')+'</h2></div>';
  try{await fetch(API+'/api/neg/game/negotiate',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({action:'abandon'})})}catch(e){}
  window.location.reload();
}

async function beginNegotiation(){
  state.phase='negotiating';state.sending=true;render();
  try{const d=await api('/api/neg/game/negotiate',{method:'POST',body:{sessionId:state.session.id,action:'begin',lang}});state.messages.push({role:'counterpart',content:d.counterpartMessage,name:d.counterpartName||state.scenario.counterpartName});state.exchangeCount=d.exchangeCount;state.sending=false;render();scrollToBottom()}catch(e){state.sending=false;render()}
}

async function sendMessage(){
  const ta=document.getElementById('msg-input');const msg=ta.value.trim();if(!msg||state.sending)return;
  state.messages.push({role:'user',content:msg});ta.value='';ta.style.height='42px';state.sending=true;render();scrollToBottom();
  try{
    const d=await api('/api/neg/game/negotiate',{method:'POST',body:{sessionId:state.session.id,message:msg,lang}});
    state.messages.push({role:'counterpart',content:d.counterpartMessage,name:d.counterpartName});
    if(d.louisHint){state.messages.push({role:'louis',content:d.louisHint})}
    state.exchangeCount=d.exchangeCount;state.status=d.status;
    if(d.status==='walkaway'||d.status==='completed'){state.phase='ended';state.endReason=d.status==='walkaway'?t('neg_walked_away'):t('neg_deal_reached')}
    if(d.nearEnd)state.messages.push({role:'system',content:t('neg_near_end')});
    state.sending=false;render();scrollToBottom()
  }catch(e){state.sending=false;state.messages.push({role:'system',content:t('neg_error')});render()}
}

async function askLouis(){
  var inp=document.getElementById('louis-input');var q=inp.value.trim();if(!q||state.louisSending)return;
  // Add user message to Louis chat
  state.louisChat.push({role:'user',content:q});
  inp.value='';state.louisSending=true;render();scrollLouisToBottom();
  try{
    // Build louisHistory for the backend (previous exchanges only, not current question)
    var historyForBackend=state.louisChat.slice(0,-1);
    var d=await api('/api/neg/game/ask-louis',{method:'POST',body:{sessionId:state.session.id,question:q,playerName:userName,lang:lang,louisHistory:historyForBackend}});
    // Add Louis response to chat
    state.louisChat.push({role:'louis',content:d.advice});
    // Also add to main messages so it's visible in transcript
    state.messages.push({role:'louis',content:d.advice,question:q});
    state.louisSending=false;render();scrollLouisToBottom();
  }catch(e){
    state.louisChat.push({role:'louis',content:lang==='fr'?'Désolé, je suis momentanément indisponible. Réessayez.':'Sorry, I\'m momentarily unavailable. Try again.'});
    state.louisSending=false;render();scrollLouisToBottom();
  }
}
function scrollLouisToBottom(){setTimeout(function(){var el=document.querySelector('.louis-chat-messages');if(el)el.scrollTop=el.scrollHeight},50)}

async function walkAway(){
  if(!confirm(t('neg_confirm_walk')))return;state.sending=true;render();
  try{const d=await api('/api/neg/game/negotiate',{method:'POST',body:{sessionId:state.session.id,action:'walkaway',lang}});state.messages.push({role:'counterpart',content:d.counterpartMessage});state.phase='ended';state.endReason=t('neg_walked_away');state.sending=false;render();scrollToBottom()}catch(e){state.sending=false;render()}
}

async function acceptDeal(){
  state.sending=true;render();
  try{const d=await api('/api/neg/game/negotiate',{method:'POST',body:{sessionId:state.session.id,action:'accept',lang}});state.messages.push({role:'counterpart',content:d.counterpartMessage});state.phase='ended';state.endReason=t('neg_deal_reached');state.sending=false;render();scrollToBottom()}catch(e){state.sending=false;render()}
}

function viewResults(){window.location.href='/negotiate/results?session='+state.session.id}
function toggleLouis(){state.louisOpen=!state.louisOpen;render();if(state.louisOpen)setTimeout(function(){var i=document.getElementById('louis-input');if(i)i.focus();scrollLouisToBottom()},80)}
function scrollToBottom(){setTimeout(function(){var el=document.querySelector('.messages');if(el)el.scrollTop=el.scrollHeight},100)}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}

function render(){
  var app=document.getElementById('app');
  if(state.phase==='loading'){app.innerHTML='<div class="loading-screen"><img src="/louis.png" class="louis-img-lg" style="margin-bottom:16px"><div class="spinner"></div><h2>'+t('neg_loading')+'</h2><p style="color:var(--text-muted)">'+t('neg_louis_reviewing')+'</p></div>';return}
  var sc=state.scenario,br=state.briefing,pct=Math.min(100,(state.exchangeCount/state.maxExchanges)*100);
  var headerTitle=state.phase==='briefing'?t('neg_briefing_title'):state.phase==='ended'?t('neg_complete'):t('neg_room');
  var headerRight='';
  if(state.phase==='negotiating')headerRight='<div class="chat-actions"><button class="louis-voice-toggle '+(louisVoiceMuted?'muted':'')+'" onclick="event.stopPropagation();toggleLouisMute()" title="'+t('neg_louis_voice_toggle')+'">'+(louisVoiceMuted?'🔇 Voice OFF':'🔊 Voice ON')+'</button><button class="btn-walkaway" onclick="walkAway()" '+(state.sending?'disabled':'')+'>'+t('neg_walk_away')+'</button><button class="btn-deal" onclick="acceptDeal()" '+(state.sending?'disabled':'')+'>'+t('neg_accept_deal')+'</button></div>';
  else if(state.phase==='ended')headerRight='<a href="/negotiate/dashboard" style="color:var(--accent-primary);font-size:15px;font-weight:600;text-decoration:none">'+t('neg_back_dashboard')+'</a>';

  app.innerHTML='<div class="app"><div class="sidebar">'+
    '<div class="sb-header"><div class="sb-logo">Negotiate<span class="gradient-text">Sim</span> '+langToggleHTML()+'</div>'+
    '<div class="sb-identity"><div class="name gradient-text">'+userName+'</div><div class="role">'+(tsc(scenarioId,'sub')||sc.subtitle||'')+'</div></div>'+
    '<div class="sb-scenario"><strong>'+(sc.icon||'')+' '+(tsc(scenarioId,'title')||sc.title)+'</strong></div></div>'+
    '<div class="sb-section"><h3>'+t('neg_counterpart')+'</h3><div class="sb-counterpart"><div class="sb-avatar">🎭</div><div><div class="sb-cp-name">'+sc.counterpartName+'</div><div class="sb-cp-title">'+(tsc(scenarioId,'counterpartTitle')||sc.counterpartTitle||'')+'</div></div></div></div>'+
    '<div class="sb-section"><h3>'+t('neg_objectives')+'</h3><ul class="sb-obj">'+(tsc(scenarioId,'objectives')||br?.roleBrief?.objectives||[]).map(function(o){return '<li>'+o+'</li>'}).join('')+'</ul></div>'+
    '<div class="sb-section"><h3>'+t('neg_batna')+'</h3><p style="font-size:15px;color:#334155;line-height:1.5">'+(tsc(scenarioId,'batna')||br?.roleBrief?.batna||'')+'</p></div>'+
    '<div class="sb-section"><h3>'+t('neg_progress')+'</h3><div class="exchange-bar"><div class="exchange-fill" style="width:'+pct+'%"></div></div><div class="exchange-text"><span>'+t('neg_exchange')+' '+state.exchangeCount+'</span><span>~'+state.maxExchanges+'</span></div></div>'+
    '</div><div class="main">'+
    '<div class="chat-header"><h2>'+headerTitle+'</h2>'+headerRight+'</div>'+
    '<div class="messages">'+(state.phase==='briefing'?renderBriefing():'')+state.messages.map(function(m,i){return renderMessage(m,i)}).join('')+(state.sending&&state.phase==='negotiating'?'<div class="msg msg-counterpart"><div class="msg-label counterpart">🎭 '+sc.counterpartName+'</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>':'')+(state.phase==='ended'?renderEnded():'')+'</div>'+
    (state.phase==='negotiating'?
      (state.louisOpen?renderLouisDrawer():'')+
      '<div class="input-area">'+
      '<div class="input-row"><button class="btn-louis-hat '+(state.louisOpen?'active':'')+'" onclick="toggleLouis()" title="Louis"><img src="/louis.png" style="width:32px;height:32px;border-radius:50%;object-fit:cover"></button><textarea id="msg-input" placeholder="'+t('neg_negotiate_as')+' '+userName+'..." rows="1" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendMessage()}" oninput="this.style.height=\'42px\';this.style.height=Math.min(100,this.scrollHeight)+\'px\'" '+(state.sending?'disabled':'')+'></textarea><button class="btn-send '+(state.sending?'inactive':'active')+'" onclick="sendMessage()" '+(state.sending?'disabled':'')+'><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button></div>'+
      '<div class="input-hint"><span>'+t('neg_ask_louis_hint')+'</span><span>'+t('neg_enter_send')+'</span></div></div>':'')+
    '</div></div>';
}

function renderBriefing(){
  var briefText=state.briefing?.louis||'...';
  // Auto-speak briefing ONCE only
  if(!state.louisSpoken.briefing){
    state.louisSpoken.briefing=true;
  }
  return '<div class="briefing-card"><div style="display:flex;align-items:center;gap:14px;margin-bottom:12px"><img src="/louis.png" class="louis-img-lg"><div><h3>'+t('neg_louis_briefing')+'</h3><div class="subtitle">'+t('neg_ai_coach')+'</div></div><button class="btn-listen" id="btn-listen-briefing" onclick="listenBriefing()"><span class="listen-icon">🔊</span> '+t('neg_listen_louis')+'</button></div><div class="briefing-louis">'+briefText+'</div><button class="btn-begin" onclick="louisStop();beginNegotiation()" '+(state.sending?'disabled':'')+'>'+(state.sending?t('neg_starting'):t('neg_enter_room')+' '+state.scenario.counterpartName+' →')+'</button></div>';
}

function renderMessage(m,i){
  if(m.role==='user')return '<div class="msg msg-user"><div class="msg-label user">'+userName+'</div><div class="msg-bubble">'+esc(m.content)+'</div></div>';
  if(m.role==='counterpart')return '<div class="msg msg-counterpart"><div class="msg-label counterpart">🎭 '+(m.name||state.scenario?.counterpartName||'')+'</div><div class="msg-bubble">'+esc(m.content)+'</div></div>';
  if(m.role==='louis')return '<div class="msg msg-louis">'+(m.question?'<div class="msg-louis-q">"'+esc(m.question)+'"</div>':'')+'<div class="msg-label louis"><img src="/louis.png" class="louis-img-sm" style="display:inline-block;vertical-align:middle;margin-right:6px"> Louis'+(m.question?' — '+t('neg_advice'):' — '+t('neg_coach'))+'</div><div class="msg-bubble">'+esc(m.content)+'</div><button class="btn-listen" id="btn-listen-msg'+i+'" onclick="listenMsg('+i+')" style="margin-top:8px;padding:7px 14px;font-size:13px"><span class="listen-icon">🔊</span> '+t('neg_listen_louis')+'</button></div>';
  return '<div class="msg msg-system"><div class="msg-bubble">'+esc(m.content)+'</div></div>';
}

function renderEnded(){
  return '<div class="session-ended"><h3>'+state.endReason+'</h3><p>'+t('neg_analyzing')+'</p><button class="btn-results" onclick="viewResults()">'+t('neg_view_scorecard')+'</button><div style="margin-top:16px"><a href="/negotiate/dashboard" style="color:var(--text-secondary);font-size:15px;text-decoration:none">'+t('neg_back_dashboard')+'</a></div></div>';
}

function renderLouisDrawer(){
  var msgs='';
  if(state.louisChat.length===0){
    msgs='<div class="louis-chat-empty"><span>🎓</span>'+t('neg_louis_chat_empty')+'</div>';
  } else {
    msgs=state.louisChat.map(function(m){
      if(m.role==='user') return '<div class="lcm lcm-user">'+esc(m.content)+'</div>';
      return '<div class="lcm lcm-louis"><div class="lcm-name"><img src="/louis.png" style="width:16px;height:16px;border-radius:50%"> Louis</div>'+esc(m.content)+'</div>';
    }).join('');
  }
  if(state.louisSending){
    msgs+='<div class="louis-typing"><img src="/louis.png" style="width:18px;height:18px;border-radius:50%;border:1px solid var(--louis-gold)"> <div class="typing"><span></span><span></span><span></span></div></div>';
  }
  return '<div class="louis-drawer">'+
    '<div class="louis-drawer-header"><div class="louis-drawer-header-left"><img src="/louis.png" class="louis-img-sm"><div><h3>Louis</h3><div class="louis-status">● '+t('neg_louis_online')+'</div></div></div><button class="louis-drawer-close" onclick="toggleLouis()">✕</button></div>'+
    '<div class="louis-chat-messages">'+msgs+'</div>'+
    '<div class="louis-drawer-input"><input id="louis-input" placeholder="'+t('neg_louis_chat_placeholder')+'" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey)askLouis()" '+(state.louisSending?'disabled':'')+' autocomplete="off"><button class="btn-louis-send" onclick="askLouis()" '+(state.louisSending?'disabled':'')+'>'+t('neg_send_louis')+'</button></div>'+
    '</div>';
}

init();
</script></body></html>
